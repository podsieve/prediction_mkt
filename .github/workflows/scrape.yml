name: Scrape Arena Leaderboard

on:
  schedule:
    # Arena refreshes its leaderboard only ~weekly, landing Thursday around
    # 03:00-14:00 UTC (Wed night US). ~94% of more frequent scrapes are exact
    # duplicates, so we scrape lightly most days and densely around Thursday.
    #
    # Baseline: once daily at 12:00 UTC on non-Thursday days (catches the rare
    # mid-week touch-up).
    - cron: '0 12 * * 0,1,2,3,5,6'
    # Dense window around the weekly Thursday refresh: Wednesday night plus
    # hourly across Thursday morning/midday UTC.
    - cron: '0 23 * * 3'
    - cron: '0 0-14 * * 4'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'manual run'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m src.scraper

      - name: Check alerts and send email
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python -m alerts.run events
